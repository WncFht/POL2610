    <text x="122" y="464" fill="#1B2430" font-size="24">定义共同方向与合作图景</text>
    <text x="122" y="548" fill="#51657B" font-size="26" font-weight="700">关键词</text>
    <text x="122" y="590" fill="#51657B" font-size="22">伙伴关系、印太、三边常态化</text>
    <rect x="120" y="664" width="208" height="54" rx="16" fill="#F5F9FD"/>
    <text x="144" y="699" fill="#214C74" font-size="22">政治总纲</text>
    <rect x="508" y="212" width="388" height="580" rx="32" fill="white" stroke="#B7CCE0" stroke-width="4"/>
    <rect x="542" y="254" width="320" height="98" rx="22" fill="#DCE8F3"/>
    <text x="574" y="300" fill="#214C74" font-size="38" font-weight="700">Camp David</text>
    <text x="574" y="340" fill="#214C74" font-size="38" font-weight="700">Principles</text>
    <text x="544" y="420" fill="#1B2430" font-size="30" font-weight="700">功能</text>
    <text x="544" y="464" fill="#1B2430" font-size="24">把共同价值与对外原则写明</text>
    <text x="544" y="548" fill="#51657B" font-size="26" font-weight="700">关键词</text>
    <text x="544" y="590" fill="#51657B" font-size="22">法治、和平稳定、反胁迫</text>
    <rect x="542" y="664" width="208" height="54" rx="16" fill="#F5F9FD"/>
